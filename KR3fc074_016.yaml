body:
  text: 如圖先畫初線次列法為下一層又作横線列寔為二層法首四之左一位作方匡為单位两此題以两為单位故乃以寔九十检表两位空故省筭右方相近畧小者淂八列為三層左方淂二書扵初線上与首口相當餘仿此下作線用減法減之餘一為四層以減检表右方首位是無數不計遂以一為首位視表最小者為一二仍大乃退上一層為相近畧小者淂八列為五層左方淂二書扵初線上下作線減之餘二為六層以检表右方淂二其數恰合列為七層左方淂五書扵初線上下作線減之淂八層恰尽即筭讫定位法視法所定口与初線上淂數相當處為二即加口為单位此单位是两即定為二两二錢五分為所求
  hash: sha256:ea4a0058be04334be5670506c7c3f9581ba54a25a83402a18b190ec7e7b97dd2
