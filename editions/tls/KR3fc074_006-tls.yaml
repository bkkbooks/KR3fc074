body:
  text: 扵下從末位起呼曰八減七餘一即書一扵本行下挨上呼八減五餘三即書三扵本行挨上呼五減三餘二即書二扵本行訖視線下以末位定单位逆上至首位淂百即是餘二百三十一文合问设借錢十六千五百零八文還遏九千三百八十文答曰仍欠七千一百二十八文法先列一六五八扵上層為寔次列九三八扵下層為法畢畫横線扵下末位起呼八減圈無須減即書八扵本行下挨上呼圈減八無可減借上一作㸃扵前行線上為十呼十減八存二即書二扵本行下挨上呼五減四本數三加借㸃為四存一即書一扵本行下挨上呼六減九不敷減借上一作㸃扵前行線上共成十六呼十六減九存七挨上呼曰一減㸃恰𥁞即作圈扵本行下訖視線下以末位定单位逆上至首位淂千即是仍欠七千一百二十八文合问设庫存銀十萬两數次開支無存耗平九錢八分七釐
