body:
  text: 開方法算法千變萬化總不外乎加減乘除及開方而巳苐加減乘除于用已足至開方一門非惟尋常用算者所不及即撰述名家自有所以來近載常法開方未有能淂達正負開方術意者其義實精深也通來遺書漸生又淂李尚之張古餘諸公精詣神解于秦道古李敬齋朱松庭三家之書淂祖沖之不傳緒而浚開方之術稱賅貫矣然其術維神妙義最精深非初學可驟幾今因算籌況具平立二方未可徒設故祗取常法正方數題見例未多及非故為緘祕也開方法先作初線次列實為一層自末位起平方隔一位作一點為立方隔二位三乘方隔三位餘多乘方倣此蓋加減乘除之數其等皆以每一位為一籌如以寸為單有數一二千三百四十五即是一百草三丈四尺五寸也開方則平方為一丈二十三尺四十五寸是以兩位為一等也立方則為一十二尺百四十五寸是以三位為一等也三乘方則為一尺二千三百四十五寸是以四位為一等也四乘方五位五乘方亦位皆便于也故先隔位心點
