body:
  text: 十九两五錢八分九釐法作两次加之先任列二九七因題有釐故加一圈扵上一層次列八七六九扵二層畢畫横線扵下末位起呼圈加九書九挨上呼七加六淂十三進一㸃扵左行線上書三扵本行挨上一行七加㸃為八呼九加八淂十七進一㸃扵左行線上書七扵本行挨上一行呼二加九淂十一進一㸃扵左行線上書一扵本行挨上呼只一㸃即書一加訖視線下末位定為釐逆上淂十一两七錢三分九釐次接前所淂數加列七千零七两八錢五分為四層作七緣千与两隔二位當加两圈七八五如㳒畫線加淂七千十九两五錢八分九釐合问減法设有錢五百八十八文用去三百五十七文问仍存幾何答曰存二百三十一文法先列五八八扵上為寔次列三五七扵下為法加法法实任列減法必寔在上法在下不可倒置畢畫横線
