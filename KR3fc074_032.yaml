body:
  text: 上一位淂省算亦作存空位列為亦層即將勾去挨實上一位淂四以檢籌苐四淂一一八八列為七層畢即將四勾去下作橫線用加法并之淂一一九九五八三為八層算汔末位苐三從右至左其數五與法單位相當小餘八滿半收為一共淂十一千九百九十六文為所术除法設有鹽一百七萬十斤每引四百五斤問為引𠰥干答曰二千六百四十二引用立籌并五籌上半不與籌相并因法有也先作一挨為初線次列法四百五斤為下一層法單位是五斤旁作識之又作橫線列實一百七萬十斤為二層實尾是十斤補作識之次于法首左作方匡為所定單位乃檢籌與實相近略小者淂八一列為三層其籌苐二用挨為苐二行用直為苐二格即書二于初線上與首相當下作線減實餘二六一為四層
  hash: sha256:b5a25f01bfed178e91e92d5a544e7144c3514a3e1a416c849dc9b1c969599f27
