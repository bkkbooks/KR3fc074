body:
  text: 加㳒设有錢六千五百零八文再加五千零八十文问共加淂幾何曰十一千五百八十八文法自左而右先横列六五八扵上一層次列五八為二層五千八十末位是十加一圈以存单位𠰥是百則加両圈此一定之例也餘仿此推之列畢畫一横線以湾眉目從末位起凡列數俱從首位起至末位止而算時加減及乗法則從末起挨次而左呼曰八加圈不須加仍書八扵線下挨上一行呼曰圈加八不須加亦書八扵線下挨上一行呼曰五加圈不須加仍書五扵線下挨上一行呼曰六加五淂十一則進十為一作㸃扵左行線上而書一扵本行線下挨上一行呼曰只一㸃不加即書一扵線下加訖但視線下以末位定单位為八文逆上至首位淂十千即是共十一千五百八十八文合问设收銀二両九錢七分又收八两七錢六分九釐又收七千零七两八錢五分问共收淂幾何答曰七千
  hash: sha256:fd903f1bacf1ee32a8b4598935eef1315c1d38c713936a98aa3f052f9a99c7ba
