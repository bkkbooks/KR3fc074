body:
  text: 加法設有錢六千五百零八文再加五千零八十文問共加淂幾何曰十一千五百八十八文法自左而右先橫列六五八于上一層次列五八為二層五千八十末位是十加一圈以存單位𠰥是百則加兩圈此一定之例也餘仿此推之列畢畫一橫線以灣眉目從末位起凡列數俱從首位起至末位止而算時加減及乘法則從末起挨次而左呼曰八加圈不須加仍書八于線下挨上一行呼曰圈加八不須加亦書八于線下挨上一行呼曰五加圈不須加仍書五于線下挨上一行呼曰六加五淂十一則進十為一作點于左行線上而書一于本行線下挨上一行呼曰只一點不加即書一于線下加訖但視線下以末位定單位為八文逆上至首位淂十千即是共十一千五百八十八文合問設收銀二兩九錢七分又收八兩七錢六分九釐又收七千零七兩八錢五分問共收淂幾何答曰七千
  hash: sha256:66417cb437a76f38fc3acae3c1eecc931c31f2d6a5d8a0784ffa2d338a57d0e9
