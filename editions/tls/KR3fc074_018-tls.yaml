body:
  text: 四率比例法比例之法㦯以多少㦯以大小互相為比以所知之數推求其所不知要不然原有所知之两數与今有所知之一數推淂之所求不知之一數四類而已故曰四類今读𠰥率而集韵正韵及明陈衎槎上老舌诸書俱音類盖并所其義也古名異乗同除又名今有術盖以今有之一率為主如圖先平列一二三四字扵上横作一線即將今有所知數填三率下乃審原有之两數率其同乎此為一率異乎此者為二率爰以二三率相乗㦯以二率乗三率㦯以三率乗二率俱可故二三率不妨互易惟一率則數不可易也一率除之即淂四率故曰異乗同除是以一率与二率之比即如三率与四率之比故又名四率比例如其為用至廣施之扵筭則奇正兼資精粗賅偹即居恒兑換銀錢一乗而淂㦯一除而淂者罔不由此緣其设问三率中多有全數為一者則可省除㦯乗除所得一歸不須歸也用者㦯未解此則當除者閒有法实例置之患數繁重者閒有定位舛誤之虞知用四率則皎𠰥列眉矣设例如左
