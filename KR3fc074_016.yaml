body:
  text: 如圖先畫初線次列法為下一層又作橫線列實為二層法首四之左一位作方匡為單位兩此題以兩為單位故乃以實九十檢表兩位空故省算右方相近略小者淂八列為三層左方淂二書于初線上與首口相當餘仿此下作線用減法減之餘一為四層以減檢表右方首位是無數不計遂以一為首位視表最小者為一二仍大乃退上一層為相近略小者淂八列為五層左方淂二書于初線上下作線減之餘二為六層以檢表右方淂二其數恰合列為七層左方淂五書于初線上下作線減之淂八層恰尽即算訖定位法視法所定口與初線上淂數相當處為二即加口為單位此單位是兩即定為二兩二錢五分為所求
  hash: sha256:270aedddffea352a479872cc103b6549fde1bd22fb5a67ba462be0e8e9caad94
