body:
  text: 籌數亦鈐也但鈐湏臨時立之籌則預已立定臨時排列即淂惟其中两位相合䖏湏臨时并而為㦯數大又當臨时推上一位耳如五与五合則進上為一而本位空亦与七合則直上為一而本位為三之類其籌本心橫格斜分為二左上右下直書因乗歌诀取用則橫读之自左而右梅定九氏改用横籌虛分九每上下各画半圈橫書乗诀取用則直读之自上而下上籌下半圈之數与下籌上半圈內之數恰合成一圈則並成一數眉目更為湾楚惟作之稍费工力𠧦各具一式任便可耳
