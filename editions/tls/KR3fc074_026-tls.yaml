body:
  text: 補作籌㳒籌凡十式皆用因乗诀第一籌自一一如一至一九如九止第二籌自一二如二至二九十八止第三籌至第九皆同一律餘一籌為零籌用空位𦾔法两面作之每式九根共九十根殊費工力而用時止用一面其一面費扵每用矣㦯從省則第一籌背作零籌為對二与九對三与八對四与七對五与六對則作四十五籌可淂每式九根矣然算時第一籌取用一根則零籌只八根𠰥取用二根則籌只七根矣今法用參差相對如第一籌一根与對二根即与九對三根即与八對四根即与七對五根即与六對六根与五對七根与四對八根与三對九根与二對共九根其二籌則一根与零對至八根与三對則止只有八根其三籌至七与四對止只有七對四籌至六根与五對止只有六根五籌至与六對止只五根六籌至与七對止只四根七籌至与八對止只三根八籌至与九對止只二根其九籌与零對僅一根何也盖每籌作两面不取同式故十式止有九根而而一籌至九根止則二籌至九根當与一對則与一籌之苐九根複矣故減一籌餘籌每減一根故至九籌則僅一
