body:
  text: 是去為先祖于前清正光年間手鈔作此部澣香先生復光身世未能詳也但在开方法篇中有迩未得李尚之張古餘诸公一語按尚之名銳又号四香有天元勾股細草弧失祘术細草开方説出生乾隆三十三年戊子嘉庆二十三年丁丑右餘名敦仁有开方朴記生乾隆十九年甲戌道光十四年甲午作者殆与李張二君同时㦯指后但是出之成則在是光二十五年乙已以前盖是年鈔出之年也先曾祖祘时並製有黄楊祘筹一匣在立方和筹皆附有題识文曰道光乙已冬十月丹陽揚此丹阳字乃湖北技江員之古稱非隻江苏之丹阳是也張盛藻手製計筹四十七根除立方平方両籌外实為四十五根每根祘数両与分写故一筹可作両籌之用此与书中补作筹法一节所託正相符合三十年前予于北京古玩店又𧵈得象牙祘筹一匣计筹九十缺少六筹一根实得八十九根与旧有者适获相輔相成之妙盖此乃一記數故根数适倍于前且旧有者為橫式而此則為直式也匣盖題四乐斋主人製不知何許人亦不詳其姓字审其製作年代似較前者為稍早耳
