body:
  text: 是去為先祖于前清正光年間手鈔作此部浣香先生復光身世未能詳也但在开方法篇中有邇未得李尚之張古餘諸公一語按尚之名鋭又號四香有天元勾股細草弧失祘术細草开方說出生乾隆三十三年戊子嘉慶二十三年丁丑右餘名敦仁有开方朴記生乾隆十九年甲戌道光十四年甲午作者殆與李張二君同時㦯指后但是出之成則在是光二十五年乙已以前蓋是年鈔出之年也先曾祖祘時並製有黃楊祘籌一匣在立方和籌皆附有題識文曰道光乙已冬十月丹陽揚此丹陽字乃湖北技江員之古稱非隻江苏之丹陽是也張盛藻手製計籌四十七根除立方平方兩籌外實為四十五根每根祘數兩與分寫故一籌可作兩籌之用此與書中補作籌法一節所託正相符合三十年前豫于北京古玩店又𧵈得象牙祘籌一匣計籌九十缺少六籌一根實得八十九根與舊有者適获相輔相成之妙蓋此乃一記數故根數適倍于前且舊有者為橫式而此則為直式也匣蓋題四樂斋主人製不知何許人亦不詳其姓字審其製作年代似較前者為稍早耳
