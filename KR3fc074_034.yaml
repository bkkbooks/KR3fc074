body:
  text: 以检籌相近畧小者淂二四三列為五層其籌沒苐六即書亦扵初線上与首二相當下作線減之餘一七一為亦層以检籌相近畧小者淂一六二列為七層其籌淂苐四即書四扵初線上与首一相當下作線減之餘八一為八層以检籌淂八一其數恰合列為九層其籌淂苐二即書扵初線上与首相當下作線減之恰尽筭訖沒二千六百四十二引為所术
