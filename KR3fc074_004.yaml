body:
  text: 十九兩五錢八分九釐法作兩次加之先任列二九七因題有釐故加一圈于上一層次列八七六九于二層畢畫橫線于下末位起呼圈加九書九挨上呼七加六淂十三進一㸃于左行線上書三于本行挨上一行七加㸃為八呼九加八淂十七進一㸃于左行線上書七于本行挨上一行呼二加九淂十一進一㸃于左行線上書一于本行挨上呼只一㸃即書一加訖視線下末位定為釐逆上淂十一兩七錢三分九釐次接前所淂數加列七千零七兩八錢五分為四層作七緣千與兩隔二位當加兩圈七八五如法畫線加淂七千十九兩五錢八分九釐合問減法設有錢五百八十八文用去三百五十七文問仍存幾何答曰存二百三十一文法先列五八八于上為實次列三五七于下為法加法法實任列減法必實在上法在下不可倒置畢畫橫線
