body:
  text: 六豪问共支過幾何答曰九萬九千九百九十九两零一分二釐四豪法列十萬两扵上為寔十萬至单共六位當加五圈旁用尖圈為記上書两字次列九錢八分七釐六毫扵下為法法在两下四位即扵上層補四圈畢畫横線扵下末位起呼圈減六無可減借一為十呼十減六存四書四扵下俱空位皆當借㸃挨上呼借十減八存二書二挨上呼十減九存一書一挨上呼借十減十無存止圈挨上呼借十減㸃存九書九逐行上至上至首位呼一減㸃無存止圈訖即淂答數合问乗除立表法筆筭乗除各有本法𠧦為易學計可省歌括然乗除歌括古用商除亦只有因乗一诀故學乗法較易扵除然法寔多至六七位以上者較筭訛誤雖精熟珠盤者難之故古有立鈐法其術豫作一隔如甲丁中横分十層直分左右二方左方恒書一至十止十作一此凡表定例右方用时將法數先填第一層首位前留
