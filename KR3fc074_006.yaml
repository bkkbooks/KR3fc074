body:
  text: 于下從末位起呼曰八減七餘一即書一于本行下挨上呼八減五餘三即書三于本行挨上呼五減三餘二即書二于本行訖視線下以末位定單位逆上至首位淂百即是餘二百三十一文合問設借錢十六千五百零八文還遏九千三百八十文答曰仍缺七千一百二十八文法先列一六五八于上層為實次列九三八于下層為法畢畫橫線于下末位起呼八減圈無須減即書八于本行下挨上呼圈減八無可減借上一作㸃于前行線上為十呼十減八存二即書二于本行下挨上呼五減四本數三加借㸃為四存一即書一于本行下挨上呼六減九不敷減借上一作㸃于前行線上共成十六呼十六減九存七挨上呼曰一減㸃恰𥁞即作圈于本行下訖視線下以末位定單位逆上至首位淂千即是仍缺七千一百二十八文合問設庫存銀十萬兩數次開支無存耗平九錢八分七釐
