body:
  text: 上一位淂省筭亦作存空位列為亦層即將勾去挨实上一位淂四以检籌苐四淂一一八八列為七層畢即將四勾去下作橫線用加法并之淂一一九九五八三為八層算汔末位苐三從右至左其數五与法单位相當小餘八滿半收為一共淂十一千九百九十六文為所术除法设有𥂁一百七萬十斤每引四百五斤问為引𠰥干答曰二千六百四十二引用立筹并五筹上半不与筹相并因法有也先作一挨為初線次列法四百五斤為下一層法单位是五斤旁作識之又作橫線列实一百七萬十斤為二層实尾是十斤補作識之次扵法首左作方匡為所定单位乃检籌与实相近略小者淂八一列為三層其籌苐二用挨為苐二行用直為苐二格即書二扵初線上与首相當下作線減实餘二六一為四層
  hash: sha256:8cf43843968740f750ac15faf9feb6c63dd1876f8529e13d5a1d0fe2f1668225
