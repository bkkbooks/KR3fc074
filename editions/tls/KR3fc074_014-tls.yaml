body:
  text: 線并之寔勾畢即筭訖定位法視淂數末位未齊法末位補齊之為单淂三千八百四十塊為所求又簡法法末位即淂數末位之单也除法设有銀九十两令四十人分之问每人各淂幾何答曰二两二錢五分法以人四十為法立鈐先作一横為初線上分上下二段上段留空位為填淂數之地不在層數之列初線下以法是四十補旁作識单位列第一層再作横線隔之次扵法首左一位作方匡為所定单位次列寔九十為二層其单位是两補圈与法之原单位相當乃以寔检右方視其恰合者列三層減实如不恰合則扵表退上一層所其相近畧小者減之其不尽者逐次检表減之期扵恰尽而止縂不可尽求至单位下滿半收為一不滿半去之
