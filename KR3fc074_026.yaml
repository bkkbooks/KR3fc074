body:
  text: 補作籌法籌凡十式皆用因乘訣第一籌自一一如一至一九如九止第二籌自一二如二至二九十八止第三籌至第九皆同一律餘一籌為零籌用空位𦾔法兩面作之每式九根共九十根殊費工力而用時止用一面其一面費于每用矣㦯從省則第一籌背作零籌為對二與九對三與八對四與七對五與六對則作四十五籌可淂每式九根矣然算時第一籌取用一根則零籌只八根𠰥取用二根則籌只七根矣今法用參差相對如第一籌一根與對二根即與九對三根即與八對四根即與七對五根即與六對六根與五對七根與四對八根與三對九根與二對共九根其二籌則一根與零對至八根與三對則止只有八根其三籌至七與四對止只有七對四籌至六根與五對止只有六根五籌至與六對止只五根六籌至與七對止只四根七籌至與八對止只三根八籌至與九對止只二根其九籌與零對僅一根何也蓋每籌作兩面不取同式故十式止有九根而而一籌至九根止則二籌至九根當與一對則與一籌之苐九根復矣故減一籌餘籌每減一根故至九籌則僅一
