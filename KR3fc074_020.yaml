body:
  text: 設有銀八兩每兩價一千二百文問換錢幾何答曰九千六百文原法置八兩為實以一千二百文乘之即淂今設四率設有銀八兩每千文八錢三分三釐不盡問換錢幾何答曰九千六百文原法置八兩為實以八錢三分三釐不盡三三為法除之即淂今設四率首位是錢故降一位錢每千與銀每錢相當故平列首位是兩與一率之兩相當故高一位二率小于一率則四率不應大于三率今九大于八故降一位列之而與二率相當故知是千也設有持錢二千四百文買淂銀二兩今有錢九千六百文問應買銀幾何答曰八兩原法以銀二兩為實以錢二千四百除之淂每千文合銀八錢三分三不盡以九千六百乘之
