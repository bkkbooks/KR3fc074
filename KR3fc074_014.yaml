body:
  text: 線并之實勾畢即算訖定位法視淂數末位未齊法末位補齊之為單淂三千八百四十塊為所求又簡法法末位即淂數末位之單也除法設有銀九十兩令四十人分之問每人各淂幾何答曰二兩二錢五分法以人四十為法立鈐先作一橫為初線上分上下二段上段留空位為填淂數之地不在層數之列初線下以法是四十補旁作識單位列第一層再作橫線隔之次于法首左一位作方匡為所定單位次列實九十為二層其單位是兩補圈與法之原單位相當乃以實檢右方視其恰合者列三層減實如不恰合則于表退上一層所其相近略小者減之其不尽者逐次檢表減之期于恰尽而止總不可尽求至單位下滿半收為一不滿半去之
