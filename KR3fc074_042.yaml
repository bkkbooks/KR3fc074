body:
  text: 設有立方寔八垓七京九兆二億一萬七千九百一十二问開淂幾何答曰九百五十八十萬曰億十億曰兆此小數也萬之曰億萬億曰兆為中數萬之曰億億之曰兆為大數謂之三等見五經算術法用立方籌术初商先作初線次列实為一層次每隔二位作㸃共淂三㸃爰以初㸃八七九检籌相近畧小者淂七二九列為二層其籌淂苐九即書九扵初線上苐三位為初商九百下作線減之餘一五并次㸃二一七淂一五二一七為次商实列為三層爰以初商九百角乗淂八億一萬又三之淂二兆四億三萬為三方廉法以約餘寔一五可淂五十為沒次商即以五十乗初商九百淂四萬五千又三之淂一億三萬五千為三長廉法又以法次商五十自乗淂二千五百為隅法乃并两廉一隅法淂二兆五億六萬七千五百為廉隅共法乃取二五六七五籌并之以餘寔一五二一七检籌相近畧小者淂一二八三七五共籌淂苐五即列為四層而五為定次商遂書五扵初線上二位為
