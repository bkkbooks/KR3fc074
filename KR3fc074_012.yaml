body:
  text: 識之其法首一十之左一位作方匡其式如為所豫定之數位次以實二百四十列為二層末位是十未至單位補一圈旁作之再補二圈齊法尾法首必在實單位之右一位而實之單位與方匡相當次作橫線乃于實末位起自右而左逐位逆上以表左方檢表右方乘之每實一位檢淂右方即將實已檢之一位勾去每乘淂兩層數即用加法并之舊法乘畢總加不如每兩層即一并數簡少誤實位勾畢即是算訖最下一層即淂數也如圖法列一層實列二層從實末位起此末位是空位可省算只作于三層以存空位畢即將實末勾去次挨上淂四以檢表左方四右方淂六四列為四層首齊實四餘仿此即將實四勾去次挨實上淂二以檢表左方二右方淂三二列為五層畢即將實二勾去既淂兩層下作橫
