body:
  text: 六豪問共支過幾何答曰九萬九千九百九十九兩零一分二釐四豪法列十萬兩于上為實十萬至單共六位當加五圈旁用尖圈為記上書兩字次列九錢八分七釐六毫于下為法法在兩下四位即于上層補四圈畢畫橫線于下末位起呼圈減六無可減借一為十呼十減六存四書四于下俱空位皆當借點挨上呼借十減八存二書二挨上呼十減九存一書一挨上呼借十減十無存止圈挨上呼借十減點存九書九逐行上至上至首位呼一減點無存止圈訖即淂答數合問乘除立表法筆算乘除各有本法𠧦為易學計可省歌括然乘除歌括古用商除亦只有因乘一訣故學乘法較易于除然法實多至六七位以上者較算訛誤雖精熟珠盤者難之故古有立鈐法其術豫作一隔如甲丁中橫分十層直分左右二方左方恆書一至十止十作一此凡表定例右方用時將法數先填第一層首位前留
