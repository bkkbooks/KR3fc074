body:
  text: 為凡有幾點即知當開幾位而箸目灣晰無論矣凡作點皆自單位起自右而左開法則自左而右初點為初商次點為次商三點為三商開至末點則止高為淂數此開方通例也平方設有正平方實百寸開問開淂幾何答曰十寸法用平方籌术初商先作橫線次列實一為一層次于末位旁作一點次隔一位作點共淂二點知可開兩位爰以初點一檢籌與苐一恰合淂一列二層其籌淂苐一即書于初線上苐二位自末位起此題有兩點故初商在苐二位下作線減之恰盡知每次商初線上空一位補作視初線上淂一十寸即所术設有方磚砌地作正方形共五百七十六塊問每邊𠰥干塊答曰各草四塊法用平方籌术初商先作初線次以共磚五百七十六塊列為層次從末位隔一作點共淂二點爰以初點檢籌相近略小者淂四
