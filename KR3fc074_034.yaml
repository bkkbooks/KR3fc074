body:
  text: 以檢籌相近略小者淂二四三列為五層其籌沒苐六即書亦于初線上與首二相當下作線減之餘一七一為亦層以檢籌相近略小者淂一六二列為七層其籌淂苐四即書四于初線上與首一相當下作線減之餘八一為八層以檢籌淂八一其數恰合列為九層其籌淂苐二即書于初線上與首相當下作線減之恰尽算訖沒二千六百四十二引為所术
