body:
  text: 根共淂四十九壽也而用時每數皆可具九數者何也如用第一苐二两籌中有零位則此两筹皆取其对面作零者則零籌自一至九皆可取用而法已十一位矣况法少一數則零籌數每石數九根可知也惟一籌㦯二籌用尽九根則餘籌方不𠯁九𠰥一与二皆用至九根則餘籌方不𠯁八而一与二籌皆用至九根又加零籌七根則法共廿五位用筭之題洪來未有也且即法多至廿五位实不必亦然則乗法尚可法实互易即法实同至廿五位尚可截心两次乗而并之惟除乃不𠯁耳此外再心平方自乗根立方再乗一根平方及四十五籌共四十六根可作两路立方三位濶倍之可配匣裝貯四十七籌共一千三百五十六字乗法设如砌墻買磚十二堆每堆廿五塊问共磚𠰥干荅曰共三百法取苐二与苐五籌并之籌式見前㦯苐一第二籌并之亦可湪乗可法实互易也先以法廿五列為一層次扵法首左一位作口為所定位次列实十二為二層其实之原单位二与所定方匡相當右補二圈齊法尾
