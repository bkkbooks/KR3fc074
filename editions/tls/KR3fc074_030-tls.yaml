body:
  text: 乃检籌苐二用橫則苐二行用直則苐二格淂零五零列為三層首与二相當畢即將之勾去挨上一位淂一以检籌苐一淂二五列為四層首与一相当下倣此畢即將一色去下作橫線用加法并之淂三筭汔末位与原法单位相當即沒三百塊為所求设如布十疋计四十丈三尺九寸謙定每尺價二十九文七毫毫者文下小數從佫所称非毫釐之设也问共錢𠰥干答曰十一千九百九十六文法取二九七籌并之先以法地一九七列為一層九是每文數㫄作為法单位次扵法首左一位作口為所定位次列寔四三九為二層題是问每尺三是尺為寔单位与方匡相當右補二圈齊法尾乃從实末位九起检籌苐九淂二六七三列為三層畢即將九勾去挨实上一位淂之以检籌苐三淂八九一列為四層畢即將三勾去下作橫線用加法并之淂一一五八三為五層挨实
