body:
  text: 開方法算法千變萬化搃不外乎加減乗除及開方而巳苐加減乗除扵用已𠯁至開方一门非惟尋常用算者所不及即撰述名家自有所以來近載常法開方未有能淂達正負開方術意者其義寔精深也通來遺書漸生又淂李尚之張古餘诸公精詣神觧扵秦道古李敬齋朱松庭三家之書淂祖沖之不傳緒而浚開方之術稱賅貫矣然其術維神妙義㝡精深非初學可驟幾今因算籌況具平立二方未可徒设故𥙂取常法正方數題見例未多及非故為緘祕也開方法先作初線次列实為一層自末位起平方隔一位作一㸃為立方隔二位三乗方隔三位餘多乗方倣此盖加減乗除之數其等皆以每一位為一籌如以寸為单有數一二千三百四十五即是一百廿三丈四尺五寸也開方則平方為一丈二十三尺四十五寸是以两位為一等也立方則為一十二尺百四十五寸是以三位為一等也三乗方則為一尺二千三百四十五寸是以四位為一等也四乗方五位五乗方亦位皆便扵也故先隔位心㸃
