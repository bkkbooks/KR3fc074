body:
  text: 識之其法首一十之左一位作方匡其式如為所豫定之數位次以寔二百四十列為二層末位是十未至单位補一圈旁作之再補二圈齊法尾法首必在实单位之右一位而寔之单位与方匡相當次作横線乃扵实末位起自右而左逐位逆上以表左方检表右方乗之每实一位检淂右方即將寔已检之一位勾去每乗淂两層數即用加法并之舊法乗畢總加不如每两層即一并數簡少誤寔位勾畢即是筭訖最下一層即淂數也如圖法列一層寔列二層從寔末位起此末位是空位可省筭只作扵三層以存空位畢即將寔末勾去次挨上淂四以检表左方四右方淂六四列為四層首齊实四餘仿此即將寔四勾去次挨实上淂二以检表左方二右方淂三二列為五層畢即將实二勾去既淂两層下作横
  hash: sha256:b5ef47e2fd634d213eb9f76cf12a73fb0d4c3ec84519e961cfa0e5c28cec1b1f
