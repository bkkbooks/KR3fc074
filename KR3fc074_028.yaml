body:
  text: 根共淂四十九壽也而用時每數皆可具九數者何也如用第一苐二兩籌中有零位則此兩籌皆取其對面作零者則零籌自一至九皆可取用而法已十一位矣况法少一數則零籌數每石數九根可知也惟一籌㦯二籌用尽九根則餘籌方不𠯁九𠰥一與二皆用至九根則餘籌方不𠯁八而一與二籌皆用至九根又加零籌七根則法共草五位用算之題洪來未有也且即法多至草五位實不必亦然則乘法尚可法實互易即法實同至草五位尚可截心兩次乘而并之惟除乃不𠯁耳此外再心平方自乘根立方再乘一根平方及四十五籌共四十六根可作兩路立方三位濶倍之可配匣裝貯四十七籌共一千三百五十六字乘法設如砌墻買磚十二堆每堆草五塊問共磚𠰥干答曰共三百法取苐二與苐五籌并之籌式見前㦯苐一第二籌并之亦可湪乘可法實互易也先以法草五列為一層次于法首左一位作口為所定位次列實十二為二層其實之原單位二與所定方匡相當右補二圈齊法尾
