body:
  text: 設有銀八两每两價一千二百文问換錢幾何荅曰九千六百文原法置八两為寔以一千二百文乗之即淂今设四率設有銀八两每千文八錢三分三釐不盡问換錢幾何答曰九千六百文原法置八两為寔以八錢三分三釐不盡三三為法除之即淂今设四率首位是錢故降一位錢每千与銀每錢相當故平列首位是两与一率之两相當故高一位二率小扵一率則四率不應大扵三率今九大扵八故降一位列之而与二率相當故知是千也設有持錢二千四百文買淂銀二两今有錢九千六百文问應買銀幾何荅曰八两原法以銀二两為寔以錢二千四百除之淂每千文合銀八錢三分三不尽以九千六百乗之
