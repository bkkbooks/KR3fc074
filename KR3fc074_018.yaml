body:
  text: 四率比例法比例之法㦯以多少㦯以大小互相為比以所知之數推求其所不知要不然原有所知之兩數與今有所知之一數推淂之所求不知之一數四類而已故曰四類今讀𠰥率而集韵正韵及明陳衎槎上老舌諸書俱音類蓋并所其義也古名異乘同除又名今有術蓋以今有之一率為主如圖先平列一二三四字于上橫作一線即將今有所知數填三率下乃審原有之兩數率其同乎此為一率異乎此者為二率爰以二三率相乘㦯以二率乘三率㦯以三率乘二率俱可故二三率不妨互易惟一率則數不可易也一率除之即淂四率故曰異乘同除是以一率與二率之比即如三率與四率之比故又名四率比例如其為用至廣施之于算則奇正兼資精粗賅偹即居恆兑換銀錢一乘而淂㦯一除而淂者罔不由此緣其設問三率中多有全數為一者則可省除㦯乘除所得一歸不須歸也用者㦯未解此則當除者閒有法實例置之患數繁重者閒有定位舛誤之虞知用四率則皎𠰥列眉矣設例如左
