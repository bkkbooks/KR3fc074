body:
  text: 列為二層其籌淂苐二即書二扵初線上苐二位為初商二十下作線減之餘一并次㸃淂一七六為次商寔列為三層爰倍初商平方两廉故倍之淂四遂取四籌為廉法以平方籌為隅法乃并四籌与平方籌為廉隅共法以餘數检之淂一七六恰合列為四層其籌為苐四即書四扵初線上末位為次商四下作線減之淂五層恰尽初線上商淂二十四即所术右平方立方设有上面相䓁體八千枚故堆垜成立方形長濶高相等问各幾何答曰二十枚法用立方籌术初商先作初線次列縂枚數為寔列為一層次每隔二位作㸃共淂二㸃爰以初商八检籌淂八恰合列為二層其籌淂苐二即書二扵初線上苐二位共二㸃故初商在二位為初商二十下作線減之恰尽每次商初線上空位補視初線上高淂二十枚即所求
