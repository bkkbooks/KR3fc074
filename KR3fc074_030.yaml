body:
  text: 乃檢籌苐二用橫則苐二行用直則苐二格淂零五零列為三層首與二相當畢即將之勾去挨上一位淂一以檢籌苐一淂二五列為四層首與一相当下倣此畢即將一色去下作橫線用加法并之淂三算汔末位與原法單位相當即沒三百塊為所求設如布十匹計四十丈三尺九寸謙定每尺價二十九文七毫毫者文下小數從佫所稱非毫釐之設也問共錢𠰥干答曰十一千九百九十六文法取二九七籌并之先以法地一九七列為一層九是每文數㫄作為法單位次于法首左一位作口為所定位次列實四三九為二層題是問每尺三是尺為實單位與方匡相當右補二圈齊法尾乃從實末位九起檢籌苐九淂二六七三列為三層畢即將九勾去挨實上一位淂之以檢籌苐三淂八九一列為四層畢即將三勾去下作橫線用加法并之淂一一五八三為五層挨實
