body:
  text: 次商五十下作線減之餘二一八四二并三㸃九一二淂二一八四二九一二為三商寔列為五層爰以初次商并淂九百五十自乗淂九億二千五百又三之淂二兆七億七千五百為三方廉法以約餘实二一八可淂八為泛三商即以八乗初次育并九百五十淂七千六百又三之淂二萬二千八百為三長廉法又以泛三商八自之淂六十四為隅法乃并两廉一偶法淂二兆七億三三百六十四為廉隅共法乃取二七三三六四籌并之以餘寔检之淂籌苐八恰合即列為六層而八為定之商遂書八扵初線上末位為之商八下作線減之恰盡視初線上淂九百五十八即所求右立方平方二方俱有常縱之法平方两廉立方三平廉三長廉平方一縱立方两縱而两縱又有相同不同之別頭緒繁多另有專書亦非初學所及然果能然此則扵開方之書自能領会矣
