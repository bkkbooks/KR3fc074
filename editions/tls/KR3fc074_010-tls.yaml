body:
  text: 空位作一圈豫為進位地逐加法第一條之數挨填之至十層必為一層之十倍則知表無誤筭矣所设立鈐也乗时逐位检取加之即淂因思乗為加之捷除為減之捷今乗既立鈐加之則除亦可立鈐減之自是通為一率但乗不妨法寔互易可扵两數中擇其數少者立表而除則必用法數立表不可任用又乗法表亦不須立全視寔中所有之數已偹即止除則不能豫定然用法既熟神所存乎其人今以一二三四立表為鈐式焉圖扵左方乗法设砌地一行用磚二百四十塊问十六行用磚幾何答曰三千八百四十塊法以十六為法立鈐先以法一六横列為一層六為单旁作
  hash: sha256:c0b73000e9fb079ee083668fbda40df8b4ce7cec644a173cf06c880cf2306321
